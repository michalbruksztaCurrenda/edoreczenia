                    "surface-container-high": "#dce9ff",
                    "secondary-fixed-dim": "#ffb77d",
                    "on-surface": "#0b1c30",
                    "on-primary-fixed-variant": "#1f477b",
                    "surface": "#f8f9ff",
                    "primary-container": "#003366",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#eff4ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #F8FAFC;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background selection:bg-primary-container selection:text-white">
<!-- TopAppBar Fragment - Manual Override for 'Nowa wiadomość' state -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-slate-900 border-b border-slate-800 shadow-md">
<div class="flex items-center gap-4">
<button class="text-white flex items-center justify-center p-2 hover:bg-slate-800 rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] text-sm font-semibold tracking-tight text-white uppercase tracking-wider">Nowa wiadomość</h1>
</div>
<button class="bg-secondary-container text-on-secondary-container px-6 py-2 rounded-lg font-button text-button hover:bg-orange-500 transition-colors active:scale-95 flex items-center gap-2">
            Wyślij
            <span class="material-symbols-outlined text-[18px]">send</span>
</button>
</header>
<main class="pt-24 pb-32 px-margin-mobile md:px-margin-desktop max-w-4xl mx-auto">
<!-- Composition Surface -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_2px_4px_rgba(0,51,102,0.05)] border border-outline-variant overflow-hidden">
<!-- Recipient Field -->
<div class="p-stack-md border-b border-slate-100 flex flex-col gap-2">
<label class="font-body-sm text-on-surface-variant font-medium">Odbiorca</label>
<div class="flex flex-col md:flex-row gap-stack-sm">
<div class="relative flex-grow">
<input class="w-full h-12 px-4 rounded-lg border border-outline bg-white focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all font-body-md" placeholder="Wpisz adresat lub nazwę..." type="text"/>
</div>
<button class="flex items-center justify-center gap-2 h-12 px-6 rounded-lg bg-primary-fixed-dim text-on-primary-fixed border border-primary/10 hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">gavel</span>
<span class="font-button text-button">Wyszukaj w ADE</span>
</button>
</div>
</div>
<!-- Subject Field -->
<div class="p-stack-md border-b border-slate-100 flex flex-col gap-2">
<label class="font-body-sm text-on-surface-variant font-medium">Temat</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline bg-white focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all font-body-md" placeholder="Temat wiadomości" type="text"/>
</div>
<!-- Message Body -->
<div class="p-stack-md flex flex-col gap-2">
<label class="font-body-sm text-on-surface-variant font-medium">Treść wiadomości</label>
<textarea class="w-full p-4 rounded-lg border border-outline bg-white focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all font-body-md resize-none" placeholder="Zacznij pisać tutaj..." rows="12"></textarea>
</div>
<!-- Attachments Section -->
<div class="bg-slate-50 border-t border-slate-100 p-stack-md">
<div class="flex items-center justify-between mb-4">
<h3 class="font-h3 text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary">attach_file</span>
                        Załączniki
                    </h3>
<button class="flex items-center gap-2 text-primary font-button hover:bg-primary-container/10 px-4 py-2 rounded-lg transition-colors">
<span class="material-symbols-outlined">add_circle</span>
                        Dodaj załącznik
                    </button>
</div>
<!-- Attachment List (Bento-style layout for files) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-sm">
<!-- File Item 1 -->
<div class="flex items-center justify-between p-3 bg-white border border-outline-variant rounded-xl group hover:border-primary/30 transition-colors shadow-sm">
<div class="flex items-center gap-3 overflow-hidden">
<div class="w-10 h-10 rounded-lg bg-red-50 flex items-center justify-center text-red-600 flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">picture_as_pdf</span>
</div>
<div class="truncate">
<p class="font-body-sm font-semibold text-on-surface truncate">Wniosek_egzekucyjny_2023_01.pdf</p>
<p class="text-[11px] text-on-surface-variant">2.4 MB • PDF Document</p>
</div>
</div>
<button class="p-2 text-on-surface-variant hover:text-error hover:bg-error-container/20 rounded-full transition-colors flex-shrink-0">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- File Item 2 -->
<div class="flex items-center justify-between p-3 bg-white border border-outline-variant rounded-xl group hover:border-primary/30 transition-colors shadow-sm">
<div class="flex items-center gap-3 overflow-hidden">
<div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600 flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<div class="truncate">
<p class="font-body-sm font-semibold text-on-surface truncate">Pelnomocnictwo_notarialne.docx</p>
<p class="text-[11px] text-on-surface-variant">450 KB • Word Doc</p>
</div>
</div>
<button class="p-2 text-on-surface-variant hover:text-error hover:bg-error-container/20 rounded-full transition-colors flex-shrink-0">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</div>
</div>
</div>
<!-- Utility Bar Below Composer -->
<div class="mt-stack-md flex flex-wrap gap-stack-sm justify-between items-center text-on-surface-variant px-2">
<div class="flex gap-4">
<button class="flex items-center gap-1 hover:text-primary transition-colors text-body-sm">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Zapisz jako szkic
                </button>
<button class="flex items-center gap-1 hover:text-error transition-colors text-body-sm">
<span class="material-symbols-outlined text-[18px]">delete</span>
                    Odrzuć
                </button>
</div>
<p class="text-[12px] opacity-60">Wiadomość zostanie zaszyfrowana kluczem ADE</p>
</div>
</main>
<!-- Shell Suppression applied: No BottomNavBar/SideNav as this is a focused task-based journey -->
<!-- Document Decoration for Context -->
<div class="hidden lg:block fixed bottom-8 right-8 w-64 opacity-10 pointer-events-none rotate-6 select-none">

</div>
</body></html>
